<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Featured Design</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            transition: background 0.5s;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            margin-top: 20%;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .interactive {
            text-align: center;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .interactive:hover {
            transform: scale(1.05);
        }

        @keyframes particle {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>Welcome to the Modern Featured Page</h1>
    <div class="interactive">
        <p>Experience enhanced styling, animations, and better UX!</p>
    </div>
    <script>
        // Particle effect example
        document.addEventListener('DOMContentLoaded', () => {
            const particleDiv = document.createElement('div');
            particleDiv.style.position = 'absolute';
            particleDiv.style.width = '10px';
            particleDiv.style.height = '10px';
            particleDiv.style.borderRadius = '50%';
            particleDiv.style.background = 'white';
            particleDiv.style.animation = 'particle 1s infinite';
            document.body.appendChild(particleDiv);

            // Add more particles and logic here...
        });
    </script>
</body>
</html>
