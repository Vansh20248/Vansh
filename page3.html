<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Truth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .message-box {
      max-width: 800px;
      padding: 60px 50px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1;
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      background: linear-gradient(135deg, #d81b60, #f50057);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 3.2em;
      animation: glow 2s infinite alternate;
      margin-bottom: 30px;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px #f50057); }
      to { filter: drop-shadow(0 0 15px #d81b60); }
    }

    .typed-text {
      font-size: 1.35em;
      color: #333;
      margin-top: 30px;
      white-space: pre-wrap;
      min-height: 200px;
      line-height: 1.9;
      letter-spacing: 0.5px;
    }

    .btn-next {
      margin-top: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2em;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      font-weight: 600;
    }

    .btn-next:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    #playBtn {
      position: fixed;
      top: 25px;
      right: 25px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: white;
      padding: 12px 24px;
      font-size: 1em;
      border-radius: 50px;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      font-weight: 600;
    }

    #playBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .emoji-heart {
      position: fixed;
      top: 100vh;
      font-size: 30px;
      animation: floatEmoji 7s linear forwards;
      opacity: 0.9;
      z-index: 9999;
      pointer-events: none;
      filter: drop-shadow(0 0 8px #d81b60) drop-shadow(0 0 15px #f50057);
    }

    @keyframes floatEmoji {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) rotate(180deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="message-box">
    <h1 id="greeting"></h1>
    <p class="typed-text" id="typedText"></p>
    <button class="btn-next" id="nextBtn" style="display: none;" onclick="goToPage4()">Tell me your answer →</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2023/02/21/audio_524da49917.mp3" type="audio/mpeg">
  </audio>
  <audio id="clickSound">
    <source src="https://cdn.pixabay.com/audio/2022/08/04/audio_9b7d72cd88.mp3" type="audio/mpeg">
  </audio>

  <button onclick="startMusic()" id="playBtn">🎵 Play Music</button>

  <script>
    const name = localStorage.getItem("herName") || "you";
    document.getElementById("greeting").textContent = `Hey ${name}, just one more thing... 💫`;

    const text = `There's something I've been meaning to say for a long time...

I don't know when it started… I tried to ignore it, to push it away… but the truth is—I like you.

I've said what's in my heart… now I just need to know—could you ever feel the same way about me?`;

    let i = 0;
    const speed = 40;

    function typeWriter() {
      if (i < text.length) {
        document.getElementById("typedText").textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      } else {
        document.getElementById("nextBtn").style.display = "inline-block";
      }
    }

    function goToPage4() {
      document.getElementById("clickSound").play();
      setTimeout(() => {
        window.location.href = "page4.html";
      }, 400);
    }

    function startMusic() {
      document.getElementById("bgMusic").play();
      document.getElementById("playBtn").style.display = "none";
    }

    function createEmojiHeart() {
      const heart = document.createElement("div");
      heart.classList.add("emoji-heart");
      heart.innerText = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 5 + Math.random() * 3 + "s";
      document.body.appendChild(heart);
      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(createEmojiHeart, 400);

    typeWriter();
  </script>
</body>
</html>
